<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Consórcio PCX CBS</title>

  <link rel="stylesheet" href="../css/style.css">

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

  <main class="container">

    <!-- TOPO -->
    <section class="hero-moto">

      <a href="../motos/pcxcbs.html" class="voltar">
        <i class="fa-solid fa-arrow-left"></i>
        Voltar
      </a>

      <h1>PCX CBS</h1>

      <p class="categoria">
        Tabela de consórcio
      </p>

    </section>

    <!-- CARD -->
    <section class="consorcio-box">

      <img
      src="../img/pcx cbs.svg"
      class="moto-consorcio-img">

      <h2>Sem emplacamento</h2>

      <div class="parcelas">

        <div class="parcela ativa">
          <span>80x</span>
          <strong>R$ 382,60</strong>
        </div>

        <div class="parcela">
          <span>60x</span>
          <strong>R$ 495,55</strong>
        </div>

        <div class="parcela">
          <span>48x</span>
          <strong>R$ 610,38</strong>
        </div>

        <div class="parcela">
          <span>36x</span>
          <strong>R$ 804,14</strong>
        </div>

        <div class="parcela">
          <span>24x</span>
          <strong>R$ 1.182,76</strong>
        </div>

      </div>

      <p class="observacao">
        *Os valores podem sofrer alterações conforme
        tabela do consórcio.
      </p>

      <section class="formulario-consorcio">

  <h1>Fazer agora</h1>

  <form id="formConsorcio">

    <input
    type="text"
    id="cpf"
    placeholder="CPF">

    <input
    type="text"
    id="nomeCompleto"
    placeholder="Nome completo">

    <input
    type="text"
    id="endereco"
    placeholder="Endereço completo">

    <input
    type="email"
    id="email"
    placeholder="E-mail">

    <input
    type="text"
    id="profissao"
    placeholder="Profissão">

    <input
    type="text"
    id="renda"
    placeholder="Renda mensal">

    <select id="primeiraParcela">

  <option value="">
    Escolha o plano
  </option>

  <option value="80x R$ 375,30">
    80x R$ 375,30
  </option>

  <option value="60x R$ 486,09">
    60x R$ 486,09
  </option>

  <option value="48x R$ 598,74">
    48x R$ 598,74
  </option>

  <option value="36x R$ 788,80">
    36x R$ 788,80
  </option>

  <option value="24x R$ 1.160,20">
    24x R$ 1.160,20
  </option>


</select>
    
    <select id="formaPagamento">

  <option value="">
    Forma de pagamento da primeira parcela
  </option>

  <option value="PIX">
    PIX
  </option>

  <option value="Cartão">
    Cartão
  </option>

</select>

    <button type="button" id="enviarWhatsapp">
      Enviar no WhatsApp
    </button>

  </form>

</section>

      <a
      href="https://wa.me/5574999946369"
      target="_blank">

        <button class="btn-whatsapp">

          <i class="fa-brands fa-whatsapp"></i>

          Chamar no WhatsApp

        </button>

      </a>

    </section>

  </main>

  <script>

  const nomeMoto = 'PCX ABS';

</script>

  <script src="../script/script.js"></script>

</body>
</html>
