<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Consórcio AFRICA TWIN</title>

  <link rel="stylesheet" href="../css/style.css">

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

  <main class="container">

    <!-- TOPO -->
    <section class="hero-moto">

      <a href="../motos/africa-twin.html" class="voltar">
        <i class="fa-solid fa-arrow-left"></i>
        Voltar
      </a>

      <h1>AFRICA TWIN</h1>

      <p class="categoria">
        Tabela de consórcio
      </p>

    </section>

    <!-- CARD -->
    <section class="consorcio-box">

      <img
      src="../img/CRF 1100L AFRICA TWIN.svg"
      class="moto-consorcio-img">

      <h2>Sem emplacamento</h2>

      <div class="parcelas">

        <div class="parcela ativa">
          <span>72x</span>
          <strong>R$  1.078,04</strong>
        </div>

        

      </div>

      <p class="observacao">
        *Os valores podem sofrer alterações conforme
        tabela do consórcio.
      </p>

      <section class="formulario-consorcio">

  <h1>Fazer agora</h1>

  <form id="formConsorcio">

    <input
    type="text"
    id="cpf"
    placeholder="CPF">

    <input
    type="text"
    id="estadoCivil"
    placeholder="Estado civil">

    <input
    type="text"
    id="endereco"
    placeholder="Endereço completo">

    <input
    type="email"
    id="email"
    placeholder="E-mail">

    <input
    type="text"
    id="profissao"
    placeholder="Profissão">

    <input
    type="text"
    id="renda"
    placeholder="Renda mensal">

    <input
    type="text"
    id="primeiraParcela"
    placeholder="Valor da primeira parcela">

    <button type="button" id="enviarWhatsapp">
      Enviar no WhatsApp
    </button>

  </form>

</section>

      <a
      href="https://wa.me/5574999679596"
      target="_blank">

        <button class="btn-whatsapp">

          <i class="fa-brands fa-whatsapp"></i>

          Chamar no WhatsApp

        </button>

      </a>

    </section>

  </main>

  <script src="../script/script.js"></script>

</body>
</html>
