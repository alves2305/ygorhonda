<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>POP 110i ES | Rafael Honda</title>

  <link rel="stylesheet" href="../css/style.css">

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

  <main class="container">

    <!-- HERO MOTO -->
    <section class="hero-moto">

      <a href="../index.html" class="voltar">
        <i class="fa-solid fa-arrow-left"></i>
        Voltar
      </a>

      <img
      src="../img/pop110.svg"
      class="moto-detalhe-img">

      <h1>POP 110i ES</h1>

      <p class="categoria">
        Econômica • Urbana • Honda
      </p>

    </section>

    <!-- DETALHES -->
    <section class="detalhes">

      <h2>Detalhes da moto</h2>

      <div class="info-box">

        <div class="item">
          <span>Motor</span>
          <strong>109.5cc</strong>
        </div>

        <div class="item">
          <span>Partida</span>
          <strong>Elétrica</strong>
        </div>

        <div class="item">
          <span>Combustível</span>
          <strong>Flex</strong>
        </div>

        <div class="item">
          <span>Consumo</span>
          <strong>Até 49 km/l</strong>
        </div>

      </div>

    </section>

    <!-- CONSÓRCIO -->
    <section class="consorcio">

      <h2>Planos de consórcio</h2>

      <div class="plano">

        <h3>Plano Popular</h3>

        <p>
          Parcelas a partir de
        </p>

        <strong class="valor">
          R$ 190/mês
        </strong>

        <a href="#">
          <button>
            Simular no WhatsApp
          </button>
        </a>

      </div>

    </section>

    <!-- FINANCIAMENTO -->
    <section class="financiamento">

      <h2>Financiamento</h2>

      <div class="plano">

        <p>
          Entrada facilitada +
          parcelas reduzidas.
        </p>

        <strong class="valor">
          Consulte condições
        </strong>

        <a href="#">
          <button>
            Falar com vendedor
          </button>
        </a>

      </div>

    </section>

  </main>

</body>
</html>
